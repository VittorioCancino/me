<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ER Diagram — Dealership Network Management</title>
    <style>
      :root {
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --accent-dim: rgba(124, 58, 237, 0.18);
        --bg: #0d1117;
        --surface: #161b22;
        --border: #21262d;
        --muted: #848d97;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body.embedded #topbar {
        display: none;
      }
      body.embedded #canvas {
        top: 0;
      }

      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.25rem;
        z-index: 100;
      }

      #topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      #topbar-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      #back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-decoration: none;
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }

      #back-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      #topbar h1 {
        font-size: 0.8rem;
        font-weight: 600;
        color: #c9d1d9;
        letter-spacing: -0.01em;
      }

      .ctrl-btn {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }

      .ctrl-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      #hint {
        font-size: 0.68rem;
        color: var(--muted);
        margin-left: 0.5rem;
      }

      #canvas {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        cursor: grab;
      }

      #canvas.grabbing {
        cursor: grabbing;
      }

      #diagram {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: center center;
        transform: translate(-50%, -50%);
      }

      #diagram svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div id="topbar-left">
        <a href="index.html#/24" id="back-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back to slides
        </a>
        <h1>ER Diagram — Vehicle Dealership Network Management System</h1>
      </div>
      <div id="topbar-right">
        <span id="hint">Scroll to zoom · Drag to pan</span>
        <button class="ctrl-btn" id="zoom-in-btn">+ Zoom in</button>
        <button class="ctrl-btn" id="zoom-out-btn">− Zoom out</button>
        <button class="ctrl-btn" id="reset-btn">Reset view</button>
      </div>
    </div>

    <div id="canvas">
      <div id="diagram"></div>
    </div>

        .attr("y2", (d) => nodeMap.get(d.target).y);

      const nodeSel = g

        .selectAll("g")
        .data(nodes)
        .enter()
        .append("g")
        .attr("transform", (d) => `translate(${d.x},${d.y})`);

          const target = nodeMap.get(d.target);

      let scale = 1;
      let originX = 0;
      let originY = 0;
      const ZOOM_STEP = 0.15;
      const MIN_SCALE = 0.2;
      const MAX_SCALE = 4;
      const canvas = document.getElementById("canvas");
      const diagram = document.getElementById("diagram");

      function applyTransform() {
        diagram.style.transform = `translate(calc(-50% + ${originX}px), calc(-50% + ${originY}px)) scale(${scale})`;
      }

      function resetView() {
        scale = 1;
        originX = 0;
        originY = 0;
        applyTransform();
      }

      function zoomAt(delta, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const cx = clientX - rect.left - rect.width / 2;
        const cy = clientY - rect.top - rect.height / 2;
        const newScale = Math.min(
          MAX_SCALE,
          Math.max(MIN_SCALE, scale + delta),
        );
        const ratio = newScale / scale;
        originX = cx + (originX - cx) * ratio;
        originY = cy + (originY - cy) * ratio;
        scale = newScale;
        applyTransform();
      }

      canvas.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          zoomAt(
            event.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP,
            event.clientX,
            event.clientY,
          );
        },
        { passive: false },
      );

      let dragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let originAtDragX = 0;
      let originAtDragY = 0;

      canvas.addEventListener("mousedown", (event) => {
        dragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        originAtDragX = originX;
        originAtDragY = originY;
        canvas.classList.add("grabbing");
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        originX = originAtDragX + (event.clientX - dragStartX);
        originY = originAtDragY + (event.clientY - dragStartY);
        applyTransform();
      });

      window.addEventListener("mouseup", () => {
        dragging = false;
        canvas.classList.remove("grabbing");
      });

      document.getElementById("zoom-in-btn").addEventListener("click", () => {
        const rect = canvas.getBoundingClientRect();
        zoomAt(
          ZOOM_STEP,
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
        );
      });

      document.getElementById("zoom-out-btn").addEventListener("click", () => {
        const rect = canvas.getBoundingClientRect();
        zoomAt(
          -ZOOM_STEP,
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
        );
      });

      document.getElementById("reset-btn").addEventListener("click", resetView);
    </script>
  </body>
</html>
