<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3 Solutions — TICS320</title>
    <style>
      :root {
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --accent-dim: rgba(124, 58, 237, 0.18);
        --bg: #0d1117;
        --surface: #161b22;
        --border: #21262d;
        --muted: #848d97;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: #c9d1d9;
        font-family: ui-sans-serif, system-ui, sans-serif;
        overflow: hidden;
        color-scheme: dark;
      }

      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        z-index: 100;
      }

      #topbar-left,
      #topbar-right {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      body.single-mode #topbar-right {
        display: none;
      }

      #title {
        font-size: 0.82rem;
        font-weight: 700;
        color: #c9d1d9;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }

      .btn,
      #case-select {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        min-height: 34px;
        padding: 0.35rem 0.8rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.74rem;
        font-weight: 600;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }

      .btn:hover,
      #case-select:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .nav-btn {
        width: 34px;
        padding: 0;
        font-size: 0.9rem;
      }

      .nav-btn[disabled] {
        opacity: 0.35;
        cursor: not-allowed;
      }

      #case-select {
        appearance: none;
        cursor: pointer;
        background: var(--surface);
        color: #c9d1d9;
        color-scheme: dark;
        min-width: 240px;
      }

      #case-select:focus {
        outline: none;
        color: var(--accent-light);
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
      }

      #case-select option {
        background: var(--surface);
        color: #c9d1d9;
      }

      #hint {
        font-size: 0.68rem;
        color: var(--muted);
      }

      #frame {
        position: fixed;
        top: 56px;
        left: 0;
        width: 100%;
        height: calc(100% - 56px);
        border: 0;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div id="topbar-left">
        <a id="back-btn" class="btn" href="index.html#/5">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back to slides
        </a>
        <div id="title">Exercise 3 Solutions</div>
      </div>
      <div id="topbar-right">
        <button id="prev-btn" class="btn nav-btn" aria-label="Previous solution set">&lt;</button>
        <select id="case-select" aria-label="Select solution set"></select>
        <button id="next-btn" class="btn nav-btn" aria-label="Next solution set">&gt;</button>
        <span id="hint">Each solution set opens as its own focused deck.</span>
      </div>
    </div>

    <iframe
      id="frame"
      title="Exercise 3 Solution Viewer"
      name="exercise-3-solutions-frame"
    ></iframe>

    <script>
      const cases = [
        {
          id: "sailors",
          title: "Sailors, Boats, and Rentals",
          file: "sailors-solutions.html",
          backHash: "#/5",
        },
        {
          id: "catalog",
          title: "Suppliers, Parts, and Catalog",
          file: "catalog-solutions.html",
          backHash: "#/9",
        },
        {
          id: "appointments",
          title: "Clients, Staff, and Appointments",
          file: "appointments-solutions.html",
          backHash: "#/13",
        },
      ];

      const titleEl = document.getElementById("title");
      const frameEl = document.getElementById("frame");
      const selectEl = document.getElementById("case-select");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const backBtn = document.getElementById("back-btn");
      const isSingleMode =
        new URLSearchParams(window.location.search).get("mode") === "single";

      if (isSingleMode) {
        document.body.classList.add("single-mode");
      }

      cases.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = item.title;
        selectEl.appendChild(option);
      });

      function getCurrentCaseId() {
        return new URLSearchParams(window.location.search).get("case");
      }

      function getCurrentIndex() {
        const caseId = getCurrentCaseId();
        const idx = cases.findIndex((item) => item.id === caseId);
        return idx >= 0 ? idx : 0;
      }

      function applyCase(index, { replace = false } = {}) {
        const item = cases[index];
        if (!item) return;

        selectEl.value = item.id;
        titleEl.textContent = `Solutions — ${item.title}`;
        frameEl.src = item.file;
        backBtn.href = `index.html${item.backHash}`;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === cases.length - 1;

        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("case", item.id);
        if (isSingleMode) {
          nextUrl.searchParams.set("mode", "single");
        } else {
          nextUrl.searchParams.delete("mode");
        }

        if (replace) {
          window.history.replaceState(null, "", nextUrl);
        } else {
          window.history.pushState(null, "", nextUrl);
        }
      }

      if (!isSingleMode) {
        selectEl.addEventListener("change", () => {
          const idx = cases.findIndex((item) => item.id === selectEl.value);
          applyCase(idx);
        });

        prevBtn.addEventListener("click", () => {
          const idx = getCurrentIndex();
          if (idx > 0) applyCase(idx - 1);
        });

        nextBtn.addEventListener("click", () => {
          const idx = getCurrentIndex();
          if (idx < cases.length - 1) applyCase(idx + 1);
        });
      }

      window.addEventListener("popstate", () => {
        applyCase(getCurrentIndex(), { replace: true });
      });

      applyCase(getCurrentIndex(), { replace: true });
    </script>
  </body>
</html>
