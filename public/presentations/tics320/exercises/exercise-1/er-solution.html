<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ER Diagram — MarBrisa Disco</title>
    <style>
      :root {
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --accent-dim: rgba(124, 58, 237, 0.18);
        --bg: #0d1117;
        --surface: #161b22;
        --border: #21262d;
        --muted: #848d97;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.25rem;
        z-index: 100;
      }
      #topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      #back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-decoration: none;
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      #back-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      #topbar h1 {
        font-size: 0.8rem;
        font-weight: 600;
        color: #c9d1d9;
        letter-spacing: -0.01em;
      }
      #topbar-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .ctrl-btn {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .ctrl-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      #hint {
        font-size: 0.68rem;
        color: var(--muted);
        margin-left: 0.5rem;
      }

      #canvas {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        cursor: grab;
      }
      #canvas.grabbing {
        cursor: grabbing;
      }

      #diagram {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: center center;
        transform: translate(-50%, -50%);
      }
      #diagram svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div id="topbar-left">
        <a href="index.html#/9" id="back-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back to slides
        </a>
        <h1>ER Diagram — MarBrisa Disco</h1>
      </div>
      <div id="topbar-right">
        <span id="hint">Scroll to zoom · Drag to pan</span>
        <button class="ctrl-btn" id="zoom-in-btn">+ Zoom in</button>
        <button class="ctrl-btn" id="zoom-out-btn">− Zoom out</button>
        <button class="ctrl-btn" id="reset-btn">Reset view</button>
      </div>
    </div>

    <div id="canvas">
      <div id="diagram"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script>
      const nodes = [
        { id: "CUSTOMER", label: "Customer", type: "entity", x: 180, y: 160 },
        { id: "TICKET", label: "Ticket", type: "entity", x: 520, y: 160 },
        { id: "EVENT", label: "Event", type: "entity", x: 940, y: 160 },
        { id: "PURCHASE", label: "Purchase", type: "entity", x: 420, y: 470 },
        { id: "DRINK", label: "Drink", type: "entity", x: 920, y: 470 },

        { id: "BUYS", label: "buys", type: "rel", x: 350, y: 160 },
        { id: "BELONGS_TO", label: "belongs to", type: "rel", x: 715, y: 160 },
        { id: "MAKES", label: "makes", type: "rel", x: 180, y: 470 },
        { id: "INCLUDES", label: "includes", type: "rel", x: 670, y: 470 },

        {
          id: "customer_id",
          label: "customer_id",
          type: "key-attr",
          x: 95,
          y: 80,
        },
        { id: "customer_name", label: "name", type: "attr", x: 180, y: 45 },
        { id: "customer_email", label: "email", type: "attr", x: 290, y: 80 },

        {
          id: "ticket_id",
          label: "ticket_id",
          type: "key-attr",
          x: 445,
          y: 80,
        },
        { id: "ticket_price", label: "price", type: "attr", x: 520, y: 45 },
        {
          id: "purchase_type",
          label: "purchase_type",
          type: "attr",
          x: 655,
          y: 80,
        },

        { id: "event_id", label: "event_id", type: "key-attr", x: 865, y: 80 },
        { id: "event_name", label: "name", type: "attr", x: 940, y: 45 },
        { id: "event_date", label: "date", type: "attr", x: 1055, y: 80 },

        {
          id: "purchase_id",
          label: "purchase_id",
          type: "key-attr",
          x: 320,
          y: 360,
        },
        {
          id: "purchase_time",
          label: "timestamp",
          type: "attr",
          x: 500,
          y: 340,
        },

        { id: "quantity", label: "quantity", type: "attr", x: 670, y: 610 },

        { id: "drink_id", label: "drink_id", type: "key-attr", x: 830, y: 360 },
        { id: "drink_name", label: "name", type: "attr", x: 920, y: 325 },
        { id: "drink_price", label: "price", type: "attr", x: 1030, y: 360 },
      ];

      const links = [
        { source: "CUSTOMER", target: "customer_id" },
        { source: "CUSTOMER", target: "customer_name" },
        { source: "CUSTOMER", target: "customer_email" },

        { source: "TICKET", target: "ticket_id" },
        { source: "TICKET", target: "ticket_price" },
        { source: "TICKET", target: "purchase_type" },

        { source: "EVENT", target: "event_id" },
        { source: "EVENT", target: "event_name" },
        { source: "EVENT", target: "event_date" },

        { source: "PURCHASE", target: "purchase_id" },
        { source: "PURCHASE", target: "purchase_time" },
        { source: "INCLUDES", target: "quantity" },

        { source: "DRINK", target: "drink_id" },
        { source: "DRINK", target: "drink_name" },
        { source: "DRINK", target: "drink_price" },

        {
          source: "CUSTOMER",
          target: "BUYS",
          label: "(1,1)",
          labelPos: 0.28,
          labelDx: 38,
          labelDy: -4,
        },
        {
          source: "BUYS",
          target: "TICKET",
          label: "(0,N)",
          labelPos: 0.74,
          labelDx: -40,
          labelDy: -4,
        },
        {
          source: "TICKET",
          target: "BELONGS_TO",
          label: "(0,N)",
          labelPos: 0.3,
          labelDx: 26,
          labelDy: -4,
        },
        {
          source: "BELONGS_TO",
          target: "EVENT",
          label: "(1,1)",
          labelPos: 0.72,
          labelDx: -20,
          labelDy: -4,
        },
        {
          source: "CUSTOMER",
          target: "MAKES",
          label: "(1,1)",
          labelPos: 0.35,
          labelDx: -18,
          labelDy: -74,
        },
        {
          source: "MAKES",
          target: "PURCHASE",
          label: "(0,N)",
          labelPos: 0.76,
          labelDx: -26,
          labelDy: -4,
        },
        {
          source: "PURCHASE",
          target: "INCLUDES",
          label: "(0,N)",
          labelPos: 0.34,
          labelDx: 0,
          labelDy: -4,
        },
        {
          source: "INCLUDES",
          target: "DRINK",
          label: "(1,N)",
          labelPos: 0.74,
          labelDx: -20,
          labelDy: -4,
        },
      ];

      const W = 1320;
      const H = 920;
      const nodeMap = new Map(nodes.map((n) => [n.id, n]));

      const svg = d3
        .select("#diagram")
        .append("svg")
        .attr("width", W)
        .attr("height", H);

      const g = svg.append("g");

      function linkPath(d) {
        if (d.path) {
          return d3.line()(d.path);
        }
        const s = nodeMap.get(d.source);
        const t = nodeMap.get(d.target);
        return `M ${s.x} ${s.y} L ${t.x} ${t.y}`;
      }

      const edgeGroup = g.append("g");
      edgeGroup
        .selectAll("path")
        .data(links)
        .enter()
        .append("path")
        .attr("d", linkPath)
        .attr("fill", "none")
        .attr("stroke", "#848d97")
        .attr("stroke-width", 1.25);

      const nodeSel = g
        .append("g")
        .selectAll("g")
        .data(nodes)
        .enter()
        .append("g")
        .attr("transform", (d) => `translate(${d.x},${d.y})`);

      const entities = nodeSel.filter((d) => d.type === "entity");
      entities
        .append("rect")
        .attr("x", -68)
        .attr("y", -22)
        .attr("width", 136)
        .attr("height", 44)
        .attr("rx", 2)
        .attr("fill", "#1f2937")
        .attr("stroke", "#7c3aed")
        .attr("stroke-width", 2);
      entities
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#c9d1d9")
        .attr("font-size", 13)
        .attr("font-weight", 700)
        .text((d) => d.label);

      const rels = nodeSel.filter((d) => d.type === "rel");
      rels
        .append("polygon")
        .attr("points", "0,-28 60,0 0,28 -60,0")
        .attr("fill", "#2d1b6b")
        .attr("stroke", "#a78bfa")
        .attr("stroke-width", 1.5);

      rels.each(function (d) {
        const group = d3.select(this);
        const lines = d.label.split(" ");
        group
          .selectAll("text")
          .data(lines)
          .enter()
          .append("text")
          .attr("x", 0)
          .attr("y", (_, i) => (lines.length === 1 ? 0 : i * 12 - 6))
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .attr("fill", "#c9d1d9")
          .attr("font-size", 10)
          .attr("font-weight", 600)
          .text((line) => line);
      });

      const keyAttrs = nodeSel.filter((d) => d.type === "key-attr");
      keyAttrs
        .append("ellipse")
        .attr("rx", 56)
        .attr("ry", 20)
        .attr("fill", "#0d1117")
        .attr("stroke", "#a78bfa")
        .attr("stroke-width", 1.5);
      keyAttrs
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#c9d1d9")
        .attr("font-size", 11)
        .attr("y", -1)
        .text((d) => d.label);
      keyAttrs
        .append("line")
        .attr("x1", (d) => -Math.min(d.label.length * 3.1, 48))
        .attr("x2", (d) => Math.min(d.label.length * 3.1, 48))
        .attr("y1", 5)
        .attr("y2", 5)
        .attr("stroke", "#c9d1d9")
        .attr("stroke-width", 1);

      const attrs = nodeSel.filter((d) => d.type === "attr");
      attrs
        .append("ellipse")
        .attr("rx", 52)
        .attr("ry", 18)
        .attr("fill", "#0d1117")
        .attr("stroke", "#848d97")
        .attr("stroke-width", 1);
      attrs
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#848d97")
        .attr("font-size", 11)
        .text((d) => d.label);

      g.append("g")
        .selectAll("text")
        .data(links.filter((l) => l.label))
        .enter()
        .append("text")
        .attr("fill", "#a78bfa")
        .attr("font-size", 12)
        .attr("font-weight", 600)
        .attr("text-anchor", "middle")
        .attr("x", (d) => {
          if (d.path) {
            const pathLen = d.path.length;
            const p = d.labelPos ?? 0.5;
            const start = d.path[pathLen - 2];
            const end = d.path[pathLen - 1];
            return start[0] + (end[0] - start[0]) * p + (d.labelDx ?? 0);
          }
          const s = nodeMap.get(d.source);
          const t = nodeMap.get(d.target);
          const p = d.labelPos ?? 0.5;
          return s.x + (t.x - s.x) * p + (d.labelDx ?? 0);
        })
        .attr("y", (d) => {
          if (d.path) {
            const pathLen = d.path.length;
            const p = d.labelPos ?? 0.5;
            const start = d.path[pathLen - 2];
            const end = d.path[pathLen - 1];
            return start[1] + (end[1] - start[1]) * p + (d.labelDy ?? -10);
          }
          const s = nodeMap.get(d.source);
          const t = nodeMap.get(d.target);
          const p = d.labelPos ?? 0.5;
          return s.y + (t.y - s.y) * p + (d.labelDy ?? -10);
        })
        .text((d) => d.label);

      let scale = 1;
      let originX = 0;
      let originY = 0;
      const ZOOM_STEP = 0.15;
      const MIN_SCALE = 0.2;
      const MAX_SCALE = 4;
      const canvas = document.getElementById("canvas");
      const diagram = document.getElementById("diagram");

      function applyTransform() {
        diagram.style.transform = `translate(calc(-50% + ${originX}px), calc(-50% + ${originY}px)) scale(${scale})`;
      }

      function resetView() {
        scale = 1;
        originX = 0;
        originY = 0;
        applyTransform();
      }

      function zoomAt(delta, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const cx = clientX - rect.left - rect.width / 2;
        const cy = clientY - rect.top - rect.height / 2;
        const newScale = Math.min(
          MAX_SCALE,
          Math.max(MIN_SCALE, scale + delta),
        );
        const ratio = newScale / scale;
        originX = cx + (originX - cx) * ratio;
        originY = cy + (originY - cy) * ratio;
        scale = newScale;
        applyTransform();
      }

      canvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          zoomAt(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP, e.clientX, e.clientY);
        },
        { passive: false },
      );

      let dragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let originAtDragX = 0;
      let originAtDragY = 0;

      canvas.addEventListener("mousedown", (e) => {
        dragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        originAtDragX = originX;
        originAtDragY = originY;
        canvas.classList.add("grabbing");
      });

      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        originX = originAtDragX + (e.clientX - dragStartX);
        originY = originAtDragY + (e.clientY - dragStartY);
        applyTransform();
      });

      window.addEventListener("mouseup", () => {
        dragging = false;
        canvas.classList.remove("grabbing");
      });

      document.getElementById("zoom-in-btn").addEventListener("click", () => {
        const r = canvas.getBoundingClientRect();
        zoomAt(ZOOM_STEP, r.left + r.width / 2, r.top + r.height / 2);
      });

      document.getElementById("zoom-out-btn").addEventListener("click", () => {
        const r = canvas.getBoundingClientRect();
        zoomAt(-ZOOM_STEP, r.left + r.width / 2, r.top + r.height / 2);
      });

      document.getElementById("reset-btn").addEventListener("click", resetView);
    </script>
  </body>
</html>
