<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ER Diagram — Workforce and Project Management</title>
    <style>
      :root {
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --accent-dim: rgba(124, 58, 237, 0.18);
        --bg: #0d1117;
        --surface: #161b22;
        --border: #21262d;
        --muted: #848d97;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.25rem;
        z-index: 100;
      }

      #topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      #topbar-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      #back-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-decoration: none;
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }

      #back-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      #topbar h1 {
        font-size: 0.8rem;
        font-weight: 600;
        color: #c9d1d9;
        letter-spacing: -0.01em;
      }

      .ctrl-btn {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }

      .ctrl-btn:hover {
        color: var(--accent-light);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      #hint {
        font-size: 0.68rem;
        color: var(--muted);
        margin-left: 0.5rem;
      }

      #canvas {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        cursor: grab;
      }

      #canvas.grabbing {
        cursor: grabbing;
      }

      #diagram {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: center center;
        transform: translate(-50%, -50%);
      }

      #diagram svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div id="topbar-left">
        <a href="index.html#/30" id="back-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back to slides
        </a>
        <h1>ER Diagram — Corporate Project and Workforce Management System</h1>
      </div>
      <div id="topbar-right">
        <span id="hint">Scroll to zoom · Drag to pan</span>
        <button class="ctrl-btn" id="zoom-in-btn">+ Zoom in</button>
        <button class="ctrl-btn" id="zoom-out-btn">− Zoom out</button>
        <button class="ctrl-btn" id="reset-btn">Reset view</button>
      </div>
    </div>

    <div id="canvas">
      <div id="diagram"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script>
      const nodes = [
        { id: "DEPARTMENT", type: "entity", x: 1120, y: 230 },
        { id: "EMPLOYEE", type: "entity", x: 760, y: 360 },
        { id: "PROJECT", type: "entity", x: 1480, y: 360 },

        { id: "employee_isa", type: "isa", x: 760, y: 550 },
        { id: "MANAGER", type: "entity", x: 520, y: 780 },
        { id: "TEAM_LEADER", type: "entity", x: 760, y: 780 },
        { id: "SPECIALIST", type: "entity", x: 1000, y: 780 },

        { id: "employs", type: "rel", x: 940, y: 270 },
        { id: "oversees", type: "rel", x: 1300, y: 270 },
        { id: "works_on", type: "rel", x: 1115, y: 480 },
        { id: "supervises", type: "rel", x: 500, y: 360 },
        { id: "depends_on", type: "rel", x: 1690, y: 360 },

        // Department attrs
        {
          id: "department_id",
          type: "key-attr",
          x: 1010,
          y: 160,
          label: "department_id",
        },
        { id: "department_name", type: "attr", x: 1130, y: 130, label: "name" },
        {
          id: "department_loc",
          type: "attr",
          x: 1250,
          y: 160,
          label: "location",
        },

        // Employee attrs
        {
          id: "employee_id",
          type: "key-attr",
          x: 620,
          y: 210,
          label: "employee_id",
        },
        { id: "employee_name", type: "attr", x: 760, y: 180, label: "name" },
        { id: "employee_email", type: "attr", x: 900, y: 210, label: "email" },
        { id: "employee_phone", type: "attr", x: 650, y: 480, label: "phone" },
        { id: "hire_date", type: "attr", x: 875, y: 480, label: "hire_date" },

        // Project attrs
        {
          id: "project_id",
          type: "key-attr",
          x: 1340,
          y: 210,
          label: "project_id",
        },
        { id: "project_name", type: "attr", x: 1480, y: 175, label: "name" },
        {
          id: "project_start",
          type: "attr",
          x: 1615,
          y: 210,
          label: "start_date",
        },
        { id: "project_end", type: "attr", x: 1360, y: 480, label: "end_date" },
        {
          id: "project_budget",
          type: "attr",
          x: 1590,
          y: 480,
          label: "budget",
        },

        // Subtype attrs
        {
          id: "management_level",
          type: "attr",
          x: 430,
          y: 910,
          label: "management_level",
        },
        { id: "lead_area", type: "attr", x: 760, y: 920, label: "lead_area" },
        { id: "specialty", type: "attr", x: 1095, y: 910, label: "specialty" },

        // Relationship attrs
        {
          id: "assigned_hours",
          type: "attr",
          x: 1015,
          y: 630,
          label: "assigned_hours",
        },
        {
          id: "role_in_project",
          type: "attr",
          x: 1205,
          y: 635,
          label: "role_in_project",
        },
        {
          id: "dependency_type",
          type: "attr",
          x: 1810,
          y: 500,
          label: "dependency_type",
        },
      ];

      const links = [
        { source: "DEPARTMENT", target: "department_id" },
        { source: "DEPARTMENT", target: "department_name" },
        { source: "DEPARTMENT", target: "department_loc" },

        { source: "EMPLOYEE", target: "employee_id" },
        { source: "EMPLOYEE", target: "employee_name" },
        { source: "EMPLOYEE", target: "employee_email" },
        { source: "EMPLOYEE", target: "employee_phone" },
        { source: "EMPLOYEE", target: "hire_date" },

        { source: "PROJECT", target: "project_id" },
        { source: "PROJECT", target: "project_name" },
        { source: "PROJECT", target: "project_start" },
        { source: "PROJECT", target: "project_end" },
        { source: "PROJECT", target: "project_budget" },

        { source: "MANAGER", target: "management_level" },
        { source: "TEAM_LEADER", target: "lead_area" },
        { source: "SPECIALIST", target: "specialty" },

        { source: "works_on", target: "assigned_hours" },
        { source: "works_on", target: "role_in_project" },
        { source: "depends_on", target: "dependency_type" },

        { source: "EMPLOYEE", target: "employee_isa" },
        { source: "employee_isa", target: "MANAGER" },
        { source: "employee_isa", target: "TEAM_LEADER" },
        { source: "employee_isa", target: "SPECIALIST" },

        {
          source: "DEPARTMENT",
          target: "employs",
          label: "(1,N)",
          labelPos: 0.3,
          labelDx: 0,
          labelDy: 0,
        },
        {
          source: "employs",
          target: "EMPLOYEE",
          label: "(1,1)",
          labelPos: 0.72,
          labelDx: 0,
          labelDy: 0,
        },

        {
          source: "DEPARTMENT",
          target: "oversees",
          label: "(0,N)",
          labelPos: 0.3,
          labelDx: 0,
          labelDy: 0,
        },
        {
          source: "oversees",
          target: "PROJECT",
          label: "(1,1)",
          labelPos: 0.72,
          labelDx: 0,
          labelDy: 0,
        },

        {
          source: "EMPLOYEE",
          target: "works_on",
          label: "(0,N)",
          labelPos: 0.34,
          labelDx: 0,
          labelDy: 0,
        },
        {
          source: "works_on",
          target: "PROJECT",
          label: "(1,N)",
          labelPos: 0.72,
          labelDx: 0,
          labelDy: 0,
        },

        {
          source: "EMPLOYEE",
          target: "supervises",
          label: "(0,N)",
          labelPos: 0.34,
          labelDx: 0,
          labelDy: 0,
          x1: 684,
          y1: 336,
          x2: 500,
          y2: 330,
        },
        {
          source: "supervises",
          target: "EMPLOYEE",
          label: "(0,1)",
          labelPos: 0.72,
          labelDx: 0,
          labelDy: 0,
          x1: 500,
          y1: 390,
          x2: 684,
          y2: 384,
        },

        {
          source: "PROJECT",
          target: "depends_on",
          label: "(0,N)",
          labelPos: 0.34,
          labelDx: 0,
          labelDy: 0,
          x1: 1556,
          y1: 336,
          x2: 1690,
          y2: 330,
        },
        {
          source: "depends_on",
          target: "PROJECT",
          label: "(0,N)",
          labelPos: 0.72,
          labelDx: 0,
          labelDy: 0,
          x1: 1690,
          y1: 390,
          x2: 1556,
          y2: 384,
        },
      ];

      const W = 2700,
        H = 1320;
      const nodeMap = new Map(nodes.map((node) => [node.id, node]));

      const svg = d3
        .select("#diagram")
        .append("svg")
        .attr("width", W)
        .attr("height", H);

      const g = svg.append("g");

      g.append("g")
        .selectAll("line")
        .data(links)
        .enter()
        .append("line")
        .attr("stroke", "#848d97")
        .attr("stroke-width", 1.2)
        .attr("x1", (d) => d.x1 ?? nodeMap.get(d.source).x)
        .attr("y1", (d) => d.y1 ?? nodeMap.get(d.source).y)
        .attr("x2", (d) => d.x2 ?? nodeMap.get(d.target).x)
        .attr("y2", (d) => d.y2 ?? nodeMap.get(d.target).y);

      const nodeSel = g
        .append("g")
        .selectAll("g")
        .data(nodes)
        .enter()
        .append("g")
        .attr("transform", (d) => `translate(${d.x},${d.y})`);

      const entities = nodeSel.filter((d) => d.type === "entity");
      entities
        .append("rect")
        .attr("x", -78)
        .attr("y", -24)
        .attr("width", 156)
        .attr("height", 48)
        .attr("rx", 2)
        .attr("fill", "#1f2937")
        .attr("stroke", "#7c3aed")
        .attr("stroke-width", 2);
      entities
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#c9d1d9")
        .attr("font-size", 13)
        .attr("font-weight", 700)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .text((d) => d.label ?? d.id);

      const rels = nodeSel.filter((d) => d.type === "rel");
      rels
        .append("polygon")
        .attr("points", "0,-30 64,0 0,30 -64,0")
        .attr("fill", "#2d1b6b")
        .attr("stroke", "#a78bfa")
        .attr("stroke-width", 1.5);
      rels
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#c9d1d9")
        .attr("font-size", 12)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .text((d) => d.id);

      const isaNodes = nodeSel.filter((d) => d.type === "isa");
      isaNodes
        .append("polygon")
        .attr("points", "0,-36 44,34 -44,34")
        .attr("fill", "#6d28d9")
        .attr("stroke", "#c4b5fd")
        .attr("stroke-width", 1.5);
      isaNodes
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("y", 10)
        .attr("fill", "#f5f3ff")
        .attr("font-size", 12)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .text("IsA");

      const keyAttrs = nodeSel.filter((d) => d.type === "key-attr");
      keyAttrs
        .append("ellipse")
        .attr("rx", 58)
        .attr("ry", 20)
        .attr("fill", "#0d1117")
        .attr("stroke", "#a78bfa")
        .attr("stroke-width", 1.5);
      keyAttrs
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#c9d1d9")
        .attr("font-size", 11)
        .attr("y", -1)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .text((d) => d.label);
      keyAttrs
        .append("line")
        .attr("x1", (d) => -Math.min(d.label.length * 3.0, 50))
        .attr("x2", (d) => Math.min(d.label.length * 3.0, 50))
        .attr("y1", 5)
        .attr("y2", 5)
        .attr("stroke", "#c9d1d9")
        .attr("stroke-width", 1);

      const attrs = nodeSel.filter((d) => d.type === "attr");
      attrs
        .append("ellipse")
        .attr("rx", 56)
        .attr("ry", 18)
        .attr("fill", "#0d1117")
        .attr("stroke", "#848d97")
        .attr("stroke-width", 1);
      attrs
        .append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("fill", "#848d97")
        .attr("font-size", 11)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .text((d) => d.label);

      g.append("g")
        .selectAll("text")
        .data(links.filter((link) => link.label))
        .enter()
        .append("text")
        .attr("fill", "#a78bfa")
        .attr("font-size", 12)
        .attr("font-weight", 600)
        .attr("font-family", "ui-sans-serif, system-ui, sans-serif")
        .attr("text-anchor", "middle")
        .attr("x", (d) => {
          const source = nodeMap.get(d.source);
          const target = nodeMap.get(d.target);
          const pos = d.labelPos ?? (source.type === "entity" ? 0.3 : 0.7);
          return source.x + (target.x - source.x) * pos + (d.labelDx ?? 0);
        })
        .attr("y", (d) => {
          const source = nodeMap.get(d.source);
          const target = nodeMap.get(d.target);
          const pos = d.labelPos ?? (source.type === "entity" ? 0.3 : 0.7);
          return source.y + (target.y - source.y) * pos + (d.labelDy ?? -10);
        })
        .text((d) => d.label);

      let scale = 1;
      let originX = 0;
      let originY = 0;
      const ZOOM_STEP = 0.15;
      const MIN_SCALE = 0.2;
      const MAX_SCALE = 4;
      const canvas = document.getElementById("canvas");
      const diagram = document.getElementById("diagram");

      function applyTransform() {
        diagram.style.transform = `translate(calc(-50% + ${originX}px), calc(-50% + ${originY}px)) scale(${scale})`;
      }

      function resetView() {
        scale = 1;
        originX = 0;
        originY = 0;
        applyTransform();
      }

      function zoomAt(delta, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const cx = clientX - rect.left - rect.width / 2;
        const cy = clientY - rect.top - rect.height / 2;
        const newScale = Math.min(
          MAX_SCALE,
          Math.max(MIN_SCALE, scale + delta),
        );
        const ratio = newScale / scale;
        originX = cx + (originX - cx) * ratio;
        originY = cy + (originY - cy) * ratio;
        scale = newScale;
        applyTransform();
      }

      canvas.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          zoomAt(
            event.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP,
            event.clientX,
            event.clientY,
          );
        },
        { passive: false },
      );

      let dragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let originAtDragX = 0;
      let originAtDragY = 0;

      canvas.addEventListener("mousedown", (event) => {
        dragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        originAtDragX = originX;
        originAtDragY = originY;
        canvas.classList.add("grabbing");
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        originX = originAtDragX + (event.clientX - dragStartX);
        originY = originAtDragY + (event.clientY - dragStartY);
        applyTransform();
      });

      window.addEventListener("mouseup", () => {
        dragging = false;
        canvas.classList.remove("grabbing");
      });

      document.getElementById("zoom-in-btn").addEventListener("click", () => {
        const rect = canvas.getBoundingClientRect();
        zoomAt(
          ZOOM_STEP,
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
        );
      });

      document.getElementById("zoom-out-btn").addEventListener("click", () => {
        const rect = canvas.getBoundingClientRect();
        zoomAt(
          -ZOOM_STEP,
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
        );
      });

      document.getElementById("reset-btn").addEventListener("click", resetView);
    </script>
  </body>
</html>
